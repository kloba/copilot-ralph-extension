name: Deploy docs site

# Tracked in issue #2: https://github.com/kloba/copilot-ralph-extension/issues/2
# Deploys the MkDocs Material site under /docs/ to the gh-pages branch
# whenever the docs/, mkdocs.yml, or this workflow itself change on main.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.x"
      - name: Install MkDocs Material
        run: pip install mkdocs-material==9.5.* mkdocs==1.6.*
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Deploy to gh-pages
        # Block scalar (`|`) avoids the YAML "mapping values are not
        # allowed here" parser error that fires when an inline quoted
        # string contains a literal colon (here: `docs: deploy …`).
        # Without the block scalar GitHub rejects the whole workflow
        # at parse time on every push, even ones that don't touch
        # docs/** — path filters never get a chance to run.
        run: |
          mkdocs gh-deploy --force --clean --message "docs deploy ${{ github.sha }}"
