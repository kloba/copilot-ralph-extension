name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Syntax check
        # Iterate every extension/*.mjs so new files are automatically
        # covered (the previous hard-coded list dropped events-emit.mjs).
        # `node --check` only validates its first positional argument
        # when given multiple paths, so we loop explicitly to ensure
        # every file is parsed. `set -e` propagates any failure as the
        # job's exit code.
        run: |
          set -e
          for f in extension/*.mjs; do
            node --check "$f"
          done

      - name: Run tests
        run: npm test

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run shellcheck
        run: shellcheck install.sh
