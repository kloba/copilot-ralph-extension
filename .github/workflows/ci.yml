name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        # Today the root package.json declares zero dependencies and no
        # package-lock.json is committed, so this step skips entirely.
        # If a future contributor adds deps via `npm install <pkg>`, a
        # lockfile is generated and committed; CI then runs the
        # deterministic `npm ci` against it. We deliberately do NOT
        # fall back to `npm install` — that would silently mask
        # manifest/lockfile drift (the previous `npm ci || npm install`
        # form did exactly that). If `npm ci` ever fails here, fix the
        # lockfile rather than papering over it.
        if: hashFiles('package-lock.json') != ''
        run: npm ci --no-audit --no-fund

      - name: Syntax check
        # Iterate every shipped .mjs so new files are automatically
        # covered (the previous hard-coded list dropped events-emit.mjs).
        # `node --check` only validates its first positional argument
        # when given multiple paths, so we loop explicitly to ensure
        # every file is parsed. `set -e` propagates any failure as the
        # job's exit code.
        #
        # The TUI's component tests dynamically skip in CI when ink /
        # react aren't installed (we don't run `cd packages/tui && npm
        # install` in this job), so a syntax error in
        # packages/tui/src/components/*.mjs would otherwise slip
        # through. Parse-checking is dependency-free and catches it.
        run: |
          set -e
          for f in extension/*.mjs \
                   packages/tui/src/*.mjs \
                   packages/tui/src/components/*.mjs \
                   packages/tui/bin/*.mjs; do
            node --check "$f"
          done

      - name: Run tests
        run: npm test

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run shellcheck
        run: shellcheck install.sh
