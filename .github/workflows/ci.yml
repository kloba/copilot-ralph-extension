name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel redundant in-progress runs on the SAME branch / PR so a
# fast-typing contributor pushing several commits to a PR doesn't
# burn one runner-pair (Node 20 + Node 22) per push. The grouping
# rule:
#   - PR pushes share `CI-refs/pull/<n>/merge` → cancel old run.
#   - main-branch pushes share `CI-refs/heads/main` but explicitly
#     do NOT cancel (cancel-in-progress=false on push events) so
#     the green/red signal on every merged commit is preserved.
# Manual workflow_dispatch / schedule runs (none today) would also
# be guarded by the per-event cancel toggle if added later.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        # Today the root package.json declares zero dependencies and no
        # package-lock.json is committed, so this step skips entirely.
        # If a future contributor adds deps via `npm install <pkg>`, a
        # lockfile is generated and committed; CI then runs the
        # deterministic `npm ci` against it. We deliberately do NOT
        # fall back to `npm install` — that would silently mask
        # manifest/lockfile drift (the previous `npm ci || npm install`
        # form did exactly that). If `npm ci` ever fails here, fix the
        # lockfile rather than papering over it.
        if: hashFiles('package-lock.json') != ''
        run: npm ci --no-audit --no-fund

      - name: Syntax check
        # Iterate every shipped .mjs so new files are automatically
        # covered (the previous hard-coded list dropped events-emit.mjs).
        # `node --check` only validates its first positional argument
        # when given multiple paths, so we loop explicitly to ensure
        # every file is parsed. `set -e` propagates any failure as the
        # job's exit code.
        #
        # `find` recurses so a future `packages/tui/src/<subdir>/x.mjs`
        # is auto-covered without editing this workflow. The previous
        # form listed the shallow `src` glob and the components subdir
        # separately and would have silently skipped any new subdir
        # (e.g. `src/util/`).
        #
        # The TUI's component tests dynamically skip in CI when ink /
        # react aren't installed (we don't run `cd packages/tui && npm
        # install` in this job), so a syntax error under the components
        # subdir would otherwise slip through. Parse-checking is
        # dependency-free and catches it.
        run: |
          set -e
          count=0
          while IFS= read -r -d '' f; do
            node --check "$f"
            count=$((count + 1))
          done < <(find extension packages/tui/src packages/tui/bin -type f -name '*.mjs' -print0)
          # Guard against a future refactor that empties the search
          # roots (or moves all .mjs out of them) — we want a loud
          # failure rather than a silent green run.
          if [ "$count" -lt 10 ]; then
            echo "Syntax check scanned only $count files; expected ≥10. Did the source layout move?" >&2
            exit 1
          fi
          echo "Syntax-checked $count .mjs files."

      - name: Portable syntax check (scripts/check.mjs)
        # Independent code path that exercises the same property as the
        # bash "Syntax check" step above using the portable Node script
        # (`scripts/check.mjs`, wired as `npm run check`). If the two
        # diverge — e.g. someone updates the bash roots without touching
        # the script, or vice versa — running both catches the drift
        # immediately. Also gives contributors confidence that the local
        # `npm run check` they run before pushing matches what CI will
        # do. Cheap (~5s); same files, different walker.
        run: npm run check

      - name: Run tests
        run: npm test

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run shellcheck
        run: shellcheck install.sh
