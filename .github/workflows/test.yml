name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 20.x covers our engines.node>=20 floor; 22.x is the current LTS.
        # Both are exercised so the shell-glob test runner (see commit 9a0190b)
        # keeps working on the oldest and newest supported runtimes.
        node-version: ['20.x', '22.x']
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      # No `npm ci` — the repo has zero runtime/test dependencies (see
      # package.json). Skipping install keeps the job fast and removes a
      # network step that could flake.
      - name: Syntax check sources
        run: |
          node --check extension/extension.mjs
          node --check extension/handler.mjs
      - name: Run tests
        run: npm test
