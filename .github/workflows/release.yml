name: Release

# Tag-driven release workflow. Push a tag matching v*.*.* and this:
#   1. Verifies package.json#version === tag (sans the "v" prefix).
#   2. Verifies CHANGELOG.md has a section for that version.
#   3. Runs `npm test` on the tagged commit.
#   4. Creates a GitHub Release with the CHANGELOG section as body and
#      every extension/*.mjs file attached as standalone downloadable
#      assets. The asset upload uses a shell glob so the release tracks
#      the directory automatically — a new module added under
#      extension/ ships in the next release without touching this file.
#
# All three pre-flight checks fail fast so a malformed tag never produces
# a half-baked release. See docs/RELEASING.md for the manual checklist.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  release:
    name: Cut release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js (matches engines.node in package.json)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Resolve tag and version
        id: meta
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # Strip leading "v" — package.json holds bare semver.
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${TAG} → version: ${VERSION}"

      - name: Verify package.json version matches tag
        env:
          EXPECTED: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          ACTUAL="$(node -p "require('./package.json').version")"
          if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
            echo "::error::package.json version (${ACTUAL}) does not match tag (${EXPECTED})." >&2
            echo "Bump package.json#version to ${EXPECTED} and re-tag." >&2
            exit 1
          fi
          echo "package.json version matches tag: ${ACTUAL}"

      - name: Verify CHANGELOG has a section for this version
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          # Accept any of:  ## [vX.Y.Z]   ## vX.Y.Z   ## [X.Y.Z]   ## X.Y.Z
          # (followed by anything — date, em dash, etc.)
          if ! grep -E "^## \\[?v?${VERSION//./\\.}\\]?( |$|—|-)" CHANGELOG.md > /dev/null; then
            echo "::error::CHANGELOG.md is missing a section for ${VERSION} (or ${TAG})." >&2
            echo "Add a '## ${VERSION}' or '## [${TAG}]' heading before tagging." >&2
            exit 1
          fi
          echo "CHANGELOG.md has a section for ${VERSION}."

      - name: Run tests
        run: npm test

      - name: Portable syntax check shipped .mjs (scripts/check.mjs)
        # Belt-and-suspenders alongside `npm test`: the test suite imports
        # most of `extension/`, but TUI source under `packages/tui/src`
        # only loads when ink/react are installed, so a syntax error
        # there would not fail `npm test` in this release job (we don't
        # `cd packages/tui && npm install` here). The portable
        # `scripts/check.mjs` parse-checks every shipped .mjs across all
        # roots and is dependency-free, so a release tag cannot ship a
        # syntactically broken TUI file. The check is cheap (~5 s) and
        # runs AFTER tests so a real test failure surfaces first.
        run: npm run check

      - name: Extract CHANGELOG section for this version
        id: notes
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          # Print the CHANGELOG block from the matching heading up to (but
          # excluding) the next "## " heading. Fail loudly if empty.
          NOTES_FILE="$(mktemp)"
          awk -v v="${VERSION}" '
            BEGIN { in_section = 0 }
            /^## / {
              if (in_section) { exit }
              # Strip optional leading "[" and "v", then check for an exact
              # version match at the start of the heading text.
              line = $0
              sub(/^## \[?v?/, "", line)
              if (index(line, v) == 1) {
                # Confirm the next character (if any) is a non-version char
                # so v0.7.0 doesn't accidentally match v0.7.01.
                next_char = substr(line, length(v) + 1, 1)
                if (next_char == "" || next_char == "]" || next_char == " " || next_char == "—" || next_char == "-") {
                  in_section = 1
                  next
                }
              }
            }
            in_section { print }
          ' CHANGELOG.md > "${NOTES_FILE}"
          if ! [ -s "${NOTES_FILE}" ]; then
            echo "::error::Extracted CHANGELOG section is empty for ${VERSION}." >&2
            exit 1
          fi
          echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"
          echo "── Release notes ──────────────────────────"
          cat "${NOTES_FILE}"
          echo "───────────────────────────────────────────"

      - name: Create GitHub Release with extension assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        run: |
          set -euo pipefail
          # Glob every shipped .mjs in extension/ rather than hardcoding
          # filenames — bash expands the glob at run time, so a new
          # module added under extension/ (and into install.sh's FILES
          # array, pinned by the drift guard in test/extension.test.mjs)
          # automatically ships in the next release. shopt -s nullglob
          # turns "no matches" into a missing-asset error from gh
          # release create rather than a literal `extension/*.mjs` arg.
          shopt -s nullglob
          ASSETS=(extension/*.mjs)
          if [[ ${#ASSETS[@]} -eq 0 ]]; then
            echo "::error::no extension/*.mjs files to upload as release assets" >&2
            exit 1
          fi
          gh release create "${TAG}" \
            "${ASSETS[@]}" \
            --title "${TAG}" \
            --notes-file "${NOTES_FILE}"
